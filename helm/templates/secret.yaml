{{- if not .Values.probe.existingSecret.name -}}
{{- if not .Values.probe.apiKey -}}
{{- fail "probe.apiKey is required when probe.existingSecret.name is not set. Generate an API key on the Probes page and pass it via --set-string probe.apiKey=csp_..." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cryptosight-probe.fullname" . }}
  namespace: {{ include "cryptosight-probe.namespace" . }}
  labels:
    {{- include "cryptosight-probe.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ .Values.probe.apiKey | quote }}
{{- end }}
