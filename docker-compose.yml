services:
    cryptosight-probe:
      image: ghcr.io/waltpdub/cryptosight-probe:latest
      container_name: cryptosight-probe
      pull_policy: always
      restart: unless-stopped

      volumes:
        # Mount your config.yaml into the container.
        # Copy config.yaml.example → config.yaml and fill in your probe details.
        - ./config.yaml:/config/config.yaml:ro

      # ── Passive sniffer requirements ────────────────────────────────────────
      # Uncomment ALL THREE blocks below when mode.passiveSniffer: true.
      #
      # cap_add:
      #   - NET_ADMIN
      #   - NET_RAW
      #
      # security_opt:
      #   - apparmor:unconfined
      #
      # network_mode: host

      deploy:
        resources:
          limits:
            cpus: "1.0"
            memory: 256M
          reservations:
            cpus: "0.25"
            memory: 64M

      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
  