services:
    cryptosight-probe:
      image: ghcr.io/waltpdub/cryptosight-probe:latest
      container_name: cryptosight-probe
      restart: unless-stopped

      volumes:
        # Mount your config.yaml into the container.
        # Copy config.yaml.example → config.yaml and fill in your probe details.
        - ./config.yaml:/app/config.yaml:ro

      # ── Passive sniffer requirements ────────────────────────────────────────
      # Uncomment ALL THREE blocks below when mode.passiveSniffer: true.
      #
      # Why each setting is needed:
      #   NET_RAW    — open a raw socket for pcap packet capture
      #   NET_ADMIN  — set the NIC to promiscuous mode
      #   network_mode: host — the probe must share the host network namespace so
      #                  it can see traffic on the physical interface; bridge mode
      #                  only exposes the container's own traffic
      #   apparmor:unconfined — some distributions block raw sockets via AppArmor
      #                  even with the capabilities above; remove if not needed
      #
      # Do NOT add these settings unless mode.passiveSniffer is active —
      # they expand the container's attack surface.
      #
      # cap_add:
      #   - NET_ADMIN
      #   - NET_RAW
      #
      # security_opt:
      #   - apparmor:unconfined
      #
      # network_mode: host

      deploy:
        resources:
          limits:
            cpus: "1.0"
            memory: 256M
          reservations:
            cpus: "0.25"
            memory: 64M

      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
  